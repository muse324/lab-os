<h2>タスク同期</h2>
<form id="syncForm">
  <textarea
    id="memoInput"
    name="memo"
    placeholder="メモを貼り付けて、ローカルでJSON自動生成"
    style="width:100%; height:120px"
  ></textarea>
  <br />
  <button type="button" onclick="generateSyncJson()">JSON生成</button>
  <br /><br />

  <textarea
    id="jsonInput"
    name="json"
    placeholder="JSON貼り付け（sync_key省略可）"
    style="width:100%; height:150px"
  ></textarea>
  <br />
  <button type="button" onclick="previewSync()">差分確認</button>
  <button type="button" onclick="applySelectedSync()">選択分だけ同期</button>
  <button type="button" onclick="applySync()">全同期実行</button>
  <button type="button" onclick="importTasks()">従来インポート</button>
</form>
<div
  id="syncResult"
  style="background:#f5f5f5; padding:10px; white-space:pre-wrap"
></div>
