{% if is_production %}
  <form id="deployForm" onsubmit="runDeploy(event)">
    <button type="submit" title="本番環境のコードを最新状態へ更新します">
      最新コードに更新
    </button>
    <span id="deployResult" style="margin-left:10px;"></span>
  </form>
{% endif %}

<div style="margin:8px 0;">
  <label for="syncHistoryFilter" style="font-size:0.9em;"
    >同期履歴フィルタ</label
  >
  <select
    id="syncHistoryFilter"
    onchange="window.syncHistoryFilterField=this.value||null"
    title="同期プレビュー内の履歴表示をフィールド名で絞り込みます"
  >
    <option value="">全フィールド</option>
    <option value="title">title</option>
    <option value="deadline">deadline</option>
    <option value="project_id">project_id</option>
    <option value="student_id">student_id</option>
    <option value="priority">priority</option>
    <option value="status">status</option>
  </select>
</div>
